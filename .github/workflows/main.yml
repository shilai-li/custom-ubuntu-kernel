name: Build Custom Kernel
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev dpkg-dev bc rsync kmod cpio debhelper dwarves zstd lz4 pkg-config

      - name: Download Kernel Source
        run: |
          # Use the latest Ubuntu kernel source format
          sudo sed -i 's/Types: deb/Types: deb deb-src/g' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo sed -i 's/^#\s*deb-src/deb-src/' /etc/apt/sources.list 2>/dev/null || true
          sudo apt-get update
          apt-get source linux
          
      - name: Apply Patch
        run: |
          cd linux-*
          patch -p1 < ../keyboard.patch
          echo "=== VERIFYING INJECTION ==="
          grep -C 5 "XWC-P" drivers/input/keyboard/atkbd.c
          
      - name: Configure Kernel
        run: |
          cd linux-*
          cp /boot/config-$(uname -r) .config
          make olddefconfig
          # Disable debug info to massively speed up build time and reduce file size
          scripts/config --disable DEBUG_INFO
          scripts/config --disable DEBUG_INFO_BTF
          # Clear official Ubuntu security keys so it doesn't fail trying to sign the kernel
          scripts/config --set-str SYSTEM_TRUSTED_KEYS ""
          scripts/config --set-str SYSTEM_REVOCATION_KEYS ""
          # Apply the config changes safely
          make olddefconfig
          
      - name: Build Kernel (deb packages)
        run: |
          cd linux-*
          make -j$(nproc) bindeb-pkg LOCALVERSION=-customkbd
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs
          path: "*.deb"