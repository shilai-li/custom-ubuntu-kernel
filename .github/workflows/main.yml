name: Build Custom Kernel 7.0
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev libdw-dev dpkg-dev bc rsync kmod cpio debhelper dwarves zstd lz4 pkg-config wget

      - name: Download Mainline Kernel 7.0 Source
        run: |
          # Download the stable 7.0 Linux kernel source directly from kernel.org
          wget https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.0.tar.xz
          tar -xf linux-7.0.tar.xz
          # Rename the directory to linux-source so the remaining steps match flawlessly
          mv linux-7.0 linux-source
          
      - name: Apply Patch
        run: |
          cd linux-source
          patch -p1 < ../keyboard.patch
          echo "=== VERIFYING INJECTION ==="
          grep -C 5 "XWC-P" drivers/input/keyboard/atkbd.c
          
      - name: Configure Kernel
        run: |
          cd linux-source
          # Use the default configuration layout for standard x86 systems
          make defconfig
          # Disable heavy debug details to keep the compilation within GitHub's free limits
          scripts/config --disable DEBUG_INFO
          scripts/config --disable DEBUG_INFO_BTF
          # Prevent signing errors
          scripts/config --set-str SYSTEM_TRUSTED_KEYS ""
          scripts/config --set-str SYSTEM_REVOCATION_KEYS ""
          make olddefconfig
          
      - name: Build Kernel (deb packages)
        run: |
          cd linux-source
          make -j$(nproc) bindeb-pkg LOCALVERSION=-customkbd
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs
          path: "*.deb"